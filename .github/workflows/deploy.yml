name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy exportgateway-platform
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/exportgateway/exportgateway-platform
            git fetch origin
            git reset --hard origin/main
            npm ci
            npx next build
            pm2 restart exportgateway --update-env
            pm2 save
            pm2 status
