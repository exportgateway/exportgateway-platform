services:
  - type: web
    name: intrastat-freight-allocation-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: MAPBOX_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: "*"
