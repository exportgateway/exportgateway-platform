name: Train Freight Model

on:
  push:
    paths:
      - "freight_prices.csv"
      - "train_model.py"

  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train_model.py

      - name: Commit model
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add model.pkl
          git commit -m "Auto update model" || echo "No changes"
          git push
