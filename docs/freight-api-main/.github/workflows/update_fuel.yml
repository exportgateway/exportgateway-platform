name: Update Fuel Prices Daily

on:
  schedule:
    - cron: "0 6 * * *"   # vsak dan ob 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # 🔥 KLJUČNO ZA PUSH

jobs:
  update-fuel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # FIXED

      - name: Setup Python
        uses: actions/setup-python@v5   # FIXED
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fuel update script
        run: python update_fuel.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add fuel_prices.json

          git commit -m "auto update fuel prices" || echo "No changes to commit"

          git push
