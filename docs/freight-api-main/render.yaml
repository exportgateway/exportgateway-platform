services:
  - type: web
    name: freight-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MAPBOX_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: "https://exportgateway.eu"
      - key: LOG_LEVEL
        value: INFO
